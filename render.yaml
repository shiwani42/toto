# Render Blueprint for Toto.
# Pick "New" → "Blueprint" in the Render dashboard and choose this repo;
# the dashboard reads this file and pre-fills the service config.

services:
  - type: web
    name: toto
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    envVars:
      # Optional cloud features. Set these in the Render UI; they are not
      # committed to the repo. The app runs local-only when they're empty.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_ANTHROPIC_API_KEY
        sync: false

    # SPA fallback: any unknown path serves /index.html, so query-string
    # routes like /?screen=map keep working on direct loads.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Sensible cache headers for the hashed Vite assets.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
