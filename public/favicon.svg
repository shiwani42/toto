<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square in brand green so the icon reads strongly on
       tab bars and bookmark grids regardless of OS theme. -->
  <rect width="64" height="64" rx="14" fill="#2C7A55"/>
  <!-- A simple paw print: four toe beans on top, one main pad below.
       Toto is a puppy companion; the paw is the cleanest possible mark. -->
  <g fill="#FFFFFF">
    <!-- Toe beans -->
    <ellipse cx="18" cy="22" rx="5.5" ry="7"/>
    <ellipse cx="32" cy="16" rx="6" ry="7.5"/>
    <ellipse cx="46" cy="22" rx="5.5" ry="7"/>
    <ellipse cx="52" cy="36" rx="4.5" ry="6"/>
    <ellipse cx="12" cy="36" rx="4.5" ry="6"/>
    <!-- Main pad -->
    <path d="M32 30c-9 0-15 7-15 13.5C17 49 21 53 25.5 53c3 0 4-1.5 6.5-1.5s3.5 1.5 6.5 1.5C43 53 47 49 47 43.5 47 37 41 30 32 30z"/>
  </g>
</svg>
